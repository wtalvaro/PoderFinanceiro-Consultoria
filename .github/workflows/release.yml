name: Publicar Release Gold Standard (Windows Only)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build e Distribuição Windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 1. Checkout do Código
      uses: actions/checkout@v4

    - name: 2. Configurar Java 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: 3. Compilar e Gerar JAR (Forçando Windows)
      # Forçamos o classificador win para garantir que o JAR da release tenha as DLLs nativas
      run: ./mvnw clean package -DskipTests -Djavafx.platform=win

    - name: 4. Preparar Pacote de Distribuição (.zip)
      run: |
        mkdir -p dist_package
        cp target/PoderFinanceiro.jar dist_package/
        cp iniciar.bat dist_package/
        cp iniciar.sh dist_package/
        chmod +x dist_package/iniciar.sh
        zip -r PoderFinanceiro_v${{ github.ref_name }}_Windows.zip dist_package/*

    - name: 5. Criar Release no GitHub
      uses: softprops/action-gh-release@v2
      with:
        name: ERP Poder Financeiro - Versão ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        body: |
          ## 🚀 Notas da Release - ${{ github.ref_name }}
          
          Esta versão implementa o novo sistema de **Atualização Manual Assistida**, garantindo 100% de estabilidade no Windows 11.
          
          ### 📦 Instruções:
          1. Baixe o arquivo `PoderFinanceiro_v${{ github.ref_name }}_Windows.zip` abaixo.
          2. Extraia o conteúdo em uma pasta local.
          3. Execute o `iniciar.bat`.
        files: |
          PoderFinanceiro_v${{ github.ref_name }}_Windows.zip
          target/PoderFinanceiro.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
