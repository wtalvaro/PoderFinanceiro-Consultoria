name: Publicar Release Gold Standard (Windows Only)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build e Distribuição Windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    env:
      # Prepara o pipeline para a migração de Node.js do GitHub em 2026
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
    - name: 1. Checkout do Código
      uses: actions/checkout@v4

    - name: 2. Configurar Java 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: 3. Compilar e Processar Recursos (Maven)
      # O parâmetro -Djavafx.platform=win garante a inclusão das DLLs nativas
      run: |
        chmod +x mvnw
        ./mvnw clean package -DskipTests -Djavafx.platform=win

    - name: 4. Preparar Pacote de Distribuição (.zip)
      run: |
        mkdir -p dist_package
        
        # Copia o JAR principal
        cp target/PoderFinanceiro.jar dist_package/
        
        # Copia os scripts processados pelo Maven (com a versão real injetada)
        cp target/classes/iniciar.bat dist_package/
        cp target/classes/iniciar.sh dist_package/
        
        # Garante permissão de execução para o script Linux
        chmod +x dist_package/iniciar.sh
        
        # Gera o ZIP (junk-paths para manter os arquivos na raiz do zip)
        zip -j PoderFinanceiro_${{ github.ref_name }}_Windows.zip dist_package/*

    - name: 5. Criar Release no GitHub
      uses: softprops/action-gh-release@v2
      with:
        # CORREÇÃO: Removido o 'v' extra. O ref_name já é 'v2.2.5'
        name: ERP Poder Financeiro - ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        generate_release_notes: true
        body: |
          ## 🚀 Notas da Release - ${{ github.ref_name }}
          
          Esta versão consolida a estabilidade do sistema com o novo modelo de **Atualização Manual Assistida**.
          
          ### 📦 Instruções de Instalação:
          1. Baixe o arquivo `PoderFinanceiro_${{ github.ref_name }}_Windows.zip` abaixo.
          2. Extraia o conteúdo para a pasta onde o programa está instalado.
          3. Substitua todos os arquivos quando solicitado pelo Windows.
          4. Execute o `iniciar.bat` para iniciar o sistema.
          
          ---
          *Build orquestrado via CI/CD Gold Standard (Node 24 Ready).*
        files: |
          PoderFinanceiro_${{ github.ref_name }}_Windows.zip
          target/PoderFinanceiro.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
