name: Publicar Release Automática

on:
  push:
    tags:
      - 'v*' # Dispara o fluxo quando você commita uma tag começando com 'v' (ex: v1.0.0)

jobs:
  build:
    runs-on: windows-latest # Mantém em Windows para compatibilidade total com o compilador do Launch4j
    permissions:
      contents: write

    steps:
    - name: Fazer checkout do código
      uses: actions/checkout@v4

    - name: Configurar o Java 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Compilar e Empacotar o projeto (.jar)
      run: mvn clean package -DskipTests

    # 🚀 NOVO: Executa o empacotamento do Launch4j isolado na esteira do GitHub Actions
    - name: Compilar Executável Windows (.exe) com Launch4j
      uses: fedyat/launch4j-action@v2
      with:
        # Se você tiver um arquivo .xml de configuração do Launch4j no seu projeto, aponte aqui.
        # Caso contrário, o runner monta as propriedades básicas automaticamente abaixo:
        jar: target/*.jar
        outfile: target/PoderFinanceiro.exe
        mainclass: br.com.poderfinanceiro.app.PoderFinanceiroApplication
        headerType: gui
        dontWrapJar: false
        minJreVersion: '25'

    - name: Criar Release e Upload dos Artefatos
      uses: softprops/action-gh-release@v2
      with:
        files: |
          target/*.jar
          target/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}