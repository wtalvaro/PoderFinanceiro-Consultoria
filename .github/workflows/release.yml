name: Publicar Release Gold Standard (Windows Only)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build e Distribuição Inteligente
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
    - name: 1. Checkout do Código
      uses: actions/checkout@v4

    - name: 2. Configurar Java 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: 3. Compilar e Processar Recursos (Maven)
      run: |
        chmod +x mvnw
        ./mvnw clean package -DskipTests -Djavafx.platform=win

    - name: 4. Preparar Pacote de Distribuição (.zip)
      run: |
        mkdir -p dist_package
        cp target/PoderFinanceiro.jar dist_package/
        cp target/classes/iniciar.bat dist_package/
        cp target/classes/iniciar.sh dist_package/
        chmod +x dist_package/iniciar.sh
        zip -j PoderFinanceiro_${{ github.ref_name }}_Windows.zip dist_package/*

    - name: 5. Criar Release no GitHub
      uses: softprops/action-gh-release@v2
      with:
        name: ERP Poder Financeiro - Versão ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        generate_release_notes: true
        body: |
          ## 🚀 ERP Poder Financeiro - v${{ github.ref_name }}
          Esta versão implementa a **Atualização Inteligente (Zero-Click)**.
          
          ### 📦 Como Atualizar:
          1. Clique no arquivo `PoderFinanceiro_${{ github.ref_name }}_Windows.zip` abaixo para baixar.
          2. Assim que o download terminar, **feche o programa**.
          3. Abra o programa novamente pelo seu `iniciar.bat`.
          4. O sistema detectará o pacote em Downloads e se atualizará sozinho!
        files: |
          PoderFinanceiro_${{ github.ref_name }}_Windows.zip
          target/PoderFinanceiro.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
