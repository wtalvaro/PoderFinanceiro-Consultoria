name: Publicar Release Automática

on:
  push:
    tags:
      - 'v*' # Dispara o fluxo quando você commita uma tag começando com 'v' (ex: v1.0.0)

jobs:
  build:
    runs-on: ubuntu-latest # O ambiente Linux mais rápido e estável
    permissions:
      contents: write

    steps:
    - name: Fazer checkout do código
      uses: actions/checkout@v4

    - name: Configurar o Java 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Compilar e Empacotar o projeto (.jar)
      run: ./mvnw clean package -DskipTests

    - name: Criar Release e Upload dos Artefatos
      uses: softprops/action-gh-release@v2
      with:
        files: |
          target/*.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}