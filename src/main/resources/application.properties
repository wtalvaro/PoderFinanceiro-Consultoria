# ==========================================
# 1. DATASOURCE (PostgreSQL)
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/poder_financeiro_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# 2. HIBERNATE / JPA (Modo DEV)
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Força o Hibernate a usar snake_case para tudo automaticamente
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Evita que o Hibernate tente criar ou alterar tabelas sozinho (use 'validate' ou 'none')
# Como você já tem o script SQL de migração, o 'validate' é o mais seguro
spring.jpa.hibernate.ddl-auto=validate

# Garante que o dialeto do PostgreSQL seja o correto para enums
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Mostra e formata o SQL no console para ajudar no debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

# ==========================================
# 3. CONFIGURAÇÕES DA APLICAÇÃO (JavaFX)
# ==========================================
# Desativa o servidor web embutido (Tomcat)
spring.main.web-application-type=none