# Configurações do PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/poder_financeiro_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações do Hibernate/JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Isso avisa ao Hibernate: 
# "Não encoste no banco de dados. Apenas valide se as entidades Java batem com as tabelas que o Flyway criou."
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Desativa o Tomcat Web (já que você quer focar no JavaFX desktop)
spring.main.web-application-type=none

# 1. Habilita o Flyway
spring.flyway.enabled=true

# 2. Define o local dos scripts (padrão)
spring.flyway.locations=classpath:db/migration

# 3. Baseline: Necessário se você já tem dados no banco 
# ou se o banco foi criado manualmente sem a tabela de histórico
spring.flyway.baseline-on-migrate=true

# 4. Segurança: Desativa a limpeza do banco (Clean)
# No Spring Boot 4, use estas duas para garantir
spring.flyway.clean-disabled=true
