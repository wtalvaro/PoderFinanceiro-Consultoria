<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0 !important;
            padding: 0 !important;
            overflow-x: hidden;
        }

        #chat-container {
            display: flex;
            flex-direction: column;
            gap: 0;
            width: 100%;
        }

        .message-row {
            display: flex;
            width: 100%;
            margin-bottom: 0;
        }

        /* 🎯 COESÃO VISUAL E RECUO DAS BORDAS */
        .chat-bubble {
            width: 100% !important;
            max-width: 100% !important;
            padding: 18px 32px;
            /* 🎯 Aumentado para 32px nas laterais para o texto nunca colar na borda */
            line-height: 1.6;
            white-space: normal;
            user-select: text;
            border-radius: 0 !important;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: none !important;
        }

        /* 🤖 IA / CO_PILOT (Faixa Branca) */
        .chat-bubble.bot {
            background-color: #ffffff;
            color: #000000;
        }

        /* 👨‍💻 OPERADOR / VOCÊ (Faixa Verde) */
        .chat-bubble.user {
            background-color: #eeffde;
            color: #000000;
        }

        .chat-bubble.loading {
            background-color: #f1f3f4;
            color: #6d7986;
            font-style: italic;
        }

        /* 🎯 BLINDAGEM DE FONTE MÍNIMA: Impede o Bootstrap ou a IA de encolher o texto */
        .chat-bubble,
        .chat-bubble p,
        .chat-bubble li,
        .chat-bubble td,
        .chat-bubble th,
        .chat-bubble span,
        .chat-bubble a {
            font-size: 16px !important;
            /* 🎯 Força o tamanho padrão confortável em absolutamente tudo */
        }

        /* Títulos ligeiramente maiores para manter a hierarquia visual */
        .chat-bubble h5,
        .chat-bubble h6 {
            font-size: 19px !important;
            font-weight: 600;
            color: #1e40af;
            margin-top: 16px;
            margin-bottom: 8px;
        }

        /* Ajuste fino para os Badges não ficarem gigantes, mas manterem a leitura interna em 14px */
        .chat-bubble .badge {
            font-size: 13px !important;
            padding: 5px 10px;
        }

        .chat-bubble p {
            margin-bottom: 10px;
        }

        .chat-bubble p:last-child,
        .chat-bubble ul:last-child {
            margin-bottom: 0;
        }

        .chat-bubble ul {
            margin-bottom: 10px;
            padding-left: 20px;
            /* Dá o recuo correto para os marcadores de lista */
        }

        .chat-bubble li {
            margin-bottom: 6px;
        }

        .chat-bubble a {
            color: #0284c7;
            text-decoration: none;
            font-weight: 500;
        }

        .chat-bubble a:hover {
            text-decoration: underline;
        }

        .chat-bubble hr {
            margin: 14px 0;
            opacity: 0.12;
        }

        /* Garante que tabelas fiquem limpas e legíveis na faixa */
        .chat-bubble .table {
            margin-top: 12px;
            margin-bottom: 12px;
            width: 100%;
        }
    </style>
</head>

<body>

    <div id="chat-container">
        <div class="message-row">
            <div class="chat-bubble bot">
                Olá! Sou o seu analista de crédito sênior. Como posso ajudar com margens, regras bancárias ou
                portabilidade hoje?
            </div>
        </div>
    </div>

    <script>
        function adicionarBalaoJS(textoBase64, isUsuario) {
            const container = document.getElementById('chat-container');
            const row = document.createElement('div');
            row.className = 'message-row';

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ' + (isUsuario ? 'user' : 'bot');

            const textoReal = decodeURIComponent(escape(window.atob(textoBase64)));

            // Processador higienizador de code-space
            let htmlTratado = textoReal
                .replace(/\n\s*\n/g, '<br><br>')
                .replace(/>\s*\n\s*</g, '><')
                .replace(/\n/g, ' ');

            bubble.innerHTML = htmlTratado;

            row.appendChild(bubble);
            container.appendChild(row);

            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function mostrarCarregamentoJS() {
            if (document.getElementById('loading-bubble')) return;

            const container = document.getElementById('chat-container');
            const row = document.createElement('div');
            row.id = 'loading-bubble';
            row.className = 'message-row';

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble loading';
            bubble.innerText = 'Analisando cenário...';

            row.appendChild(bubble);
            container.appendChild(row);

            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function removerCarregamentoJS() {
            const loading = document.getElementById('loading-bubble');
            if (loading) {
                loading.remove();
            }
        }

    </script>
</body>

</html>
