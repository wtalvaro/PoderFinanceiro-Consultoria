<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* ---------------------------------------------------------
           LAYOUT E BASE
           --------------------------------------------------------- */
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0 !important;
            padding: 0 !important;
            overflow-x: hidden;
        }
    
        #chat-container {
            display: flex;
            flex-direction: column;
            gap: 0;
            width: 100%;
        }
    
        .message-row {
            display: flex;
            width: 100%;
            margin-bottom: 0;
        }
    
        /* ---------------------------------------------------------
           RESET E ESPAÇAMENTO EQUILIBRADO
           --------------------------------------------------------- */
        .chat-bubble * {
            margin-top: 0 !important;
            margin-bottom: 0.6rem !important;
            /* Espaçamento padrão profissional */
        }
    
        .chat-bubble {
            width: 100% !important;
            max-width: 100% !important;
            padding: 24px 32px;
            /* Aumentado levemente para respirar */
            line-height: 1.6;
            user-select: text;
            border-radius: 0 !important;
            border-bottom: 1px solid #e5e7eb;
            /* Cor mais suave e elegante */
            box-shadow: none !important;
        }
    
        .chat-bubble.bot {
            background-color: #ffffff;
            color: #1f2937;
        }
    
        .chat-bubble.user {
            background-color: #f7fee7;
            color: #1f2937;
        }
    
        /* Verde mais sóbrio */
        .chat-bubble.loading {
            background-color: #f9fafb;
            color: #6b7280;
            font-style: italic;
        }
    
        /* ---------------------------------------------------------
           TIPOGRAFIA E HIERARQUIA (O coração da elegância)
           --------------------------------------------------------- */
        .chat-bubble,
        .chat-bubble p,
        .chat-bubble li,
        .chat-bubble span,
        .chat-bubble a {
            font-size: 15px !important;
            color: #374151;
            /* Texto levemente menos agressivo que o preto puro */
        }
    
        .chat-bubble h5,
        .chat-bubble h6 {
            margin-top: 0.35rem !important;
            /* Espaço maior antes de novos títulos */
            margin-bottom: 0.35rem !important;
            font-size: 17px !important;
            font-weight: 700;
            color: #111827;
            text-transform: uppercase;
            letter-spacing: 0.025em;
            /* Elegância nos títulos */
            border-left: 3px solid #1e40af;
            /* Identificador visual de seção */
            padding-left: 10px;
        }
    
        /* ---------------------------------------------------------
           ELEMENTOS ESPECÍFICOS (Listas e Destaques)
           --------------------------------------------------------- */
        .chat-bubble strong {
            color: #111827;
            font-weight: 600;
        }
    
        .chat-bubble ul,
        .chat-bubble ol {
            padding-left: 20px;
            margin-top: 0.2rem !important;
        }
    
        .chat-bubble li {
            margin-bottom: 0.4rem !important;
            padding-left: 5px;
        }
    
        .chat-bubble a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }
    
        .chat-bubble a:hover {
            text-decoration: underline;
        }
    
        .chat-bubble hr {
            margin: 1.5rem 0;
            opacity: 0.1;
        }
    
        /* ---------------------------------------------------------
           TABELAS (MANTIDO CONFORME SUA ESPECIFICAÇÃO)
           --------------------------------------------------------- */
        .chat-bubble table {
            width: 100%;
            border-collapse: collapse;
            margin: 0.8rem 0 !important;
            border: 1px solid #e5e7eb;
            background-color: #ffffff;
        }
    
        .chat-bubble table thead th {
            background-color: #f3f4f6 !important;
            color: #374151;
            font-weight: 600;
            padding: 10px 12px;
            border-bottom: 2px solid #e5e7eb;
            text-transform: uppercase;
            font-size: 12px !important;
        }
    
        .chat-bubble table tbody tr:nth-child(even) {
            background-color: #f9fafb !important;
        }
    
        .chat-bubble table tbody tr:nth-child(odd) {
            background-color: #ffffff !important;
        }
    
        .chat-bubble table td {
            padding: 10px 12px;
            border-bottom: 1px solid #e5e7eb;
            font-size: 14px !important;
            color: #1f2937;
        }
    
        .chat-bubble table tbody tr:hover {
            background-color: #eff6ff !important;
        }
    </style>
</head>

<body>

    <div id="chat-container">
        <div class="message-row">
            <div class="chat-bubble bot">
                Olá! Sou o seu analista de crédito sênior. Como posso ajudar com margens, regras bancárias ou
                portabilidade hoje?
            </div>
        </div>
    </div>

    <script>
        function adicionarBalaoJS(textoBase64, isUsuario) {
            const container = document.getElementById('chat-container');
            const row = document.createElement('div');
            row.className = 'message-row';

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ' + (isUsuario ? 'user' : 'bot');

            const textoReal = decodeURIComponent(escape(window.atob(textoBase64)));

            // Processador higienizador de code-space
            let htmlTratado = textoReal
                .replace(/\n\s*\n/g, '<br><br>')
                .replace(/>\s*\n\s*</g, '><')
                .replace(/\n/g, ' ');

            bubble.innerHTML = htmlTratado;

            row.appendChild(bubble);
            container.appendChild(row);

            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function mostrarCarregamentoJS() {
            if (document.getElementById('loading-bubble')) return;

            const container = document.getElementById('chat-container');
            const row = document.createElement('div');
            row.id = 'loading-bubble';
            row.className = 'message-row';

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble loading';
            bubble.innerText = 'Analisando cenário...';

            row.appendChild(bubble);
            container.appendChild(row);

            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function removerCarregamentoJS() {
            const loading = document.getElementById('loading-bubble');
            if (loading) {
                loading.remove();
            }
        }

    </script>
</body>

</html>
